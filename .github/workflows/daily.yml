name: Daily Brief

# Personal deployment: Chinese report via DeepSeek every weekday at 08:00
# Europe/Berlin time. GitHub can silently drop or heavily delay cron events,
# so two hourly probes plus a missing-report check provide automatic catch-up.

on:
  schedule:
    - cron: '7 * * * *'
    - cron: '37 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  gate:
    name: Time gate
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Check schedule
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual trigger — bypassing time gate"
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NOW_HOUR=$(TZ=Europe/Berlin date +%-H)
          NOW_DOW=$(TZ=Europe/Berlin date +%w)
          NOW_PRINT=$(TZ=Europe/Berlin date '+%Y-%m-%d %H:%M %Z')
          echo "Now in Europe/Berlin: $NOW_PRINT"

          case "$NOW_DOW" in
            1|2|3|4|5) DAY_MATCH=true ;;
            *) DAY_MATCH=false ;;
          esac

          if [ "$DAY_MATCH" != "true" ] || [ "$NOW_HOUR" -lt 8 ]; then
            echo "Before the weekday reporting window — skipping"
            echo "should-run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TODAY=$(TZ=Europe/Berlin date +%Y-%m-%d)
          CHECK_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${TODAY}/${TODAY}.html?ref=gh-pages"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$CHECK_URL" || echo "000")

          if [ "$HTTP_CODE" = "404" ]; then
            echo "Today's report is missing — starting catch-up build"
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_CODE" = "200" ]; then
            echo "Today's report already exists — skipping"
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Report existence check returned HTTP $HTTP_CODE — retrying at the next probe"
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build & publish
    needs: gate
    if: needs.gate.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore existing reports from gh-pages
        run: |
          mkdir -p daily_reports
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages --depth=1
            git --work-tree=daily_reports checkout origin/gh-pages -- . || true
            rm -f daily_reports/index.html daily_reports/archive.html
          fi

      - name: Generate today's report
        env:
          LLM_BACKEND: deepseek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPORT_LOCALE: zh
          REPORT_TZ: Europe/Berlin
          WEB_MODE: 'true'
        run: npm run daily

      - name: Build static site
        run: npm run build-site

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./daily_reports
          publish_branch: gh-pages
          keep_files: false
          commit_message: 'daily: report for ${{ github.run_id }}'
